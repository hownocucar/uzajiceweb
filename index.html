<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Pizzerie U Zajíce – Vyberte si provozovnu v Černé Hoře nebo Lhotě Rapotině. Pizza, obědová menu, rozvoz.">
  <meta name="theme-color" content="#B5342B" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#1A1512" media="(prefers-color-scheme: dark)">
  <title>Pizzerie U Zajíce</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="images/zajic.png" type="image/png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script>
    (function(){
      var t = localStorage.getItem('uzajice-theme');
      if (!t) t = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      if (t === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
    })();
  </script>
</head>
<body>
  <button class="theme-toggle theme-toggle--floating" aria-label="Přepnout motiv" title="Přepnout motiv">
    <span class="theme-toggle__track"></span>
    <span class="theme-toggle__thumb">
      <i class="fa-solid fa-sun theme-toggle__icon theme-toggle__icon--sun"></i>
      <i class="fa-solid fa-moon theme-toggle__icon theme-toggle__icon--moon"></i>
    </span>
  </button>

  <main class="hero-page">
    <div class="hero-content">

      <img src="images/zajic.png" alt="Logo Pizzerie U Zajíce" class="hero__logo">

      <h1 class="hero__brand">U Zajíce</h1>
      <div class="location-cards">

        <a href="lhota-rapotina.html" class="loc-card">
          <div class="loc-card__img-wrap">
            <img loading="lazy" src="images/lhota.jpg" alt="Menu Zajíc – Lhota Rapotina" class="loc-card__img">
          </div>
          <div class="loc-card__body">
            <h2 class="loc-card__name">Menu Zajíc</h2>
            <p class="loc-card__town">Lhota Rapotina</p>
          </div>
          <span class="loc-card__arrow"><i class="fa-solid fa-arrow-right"></i></span>
        </a>

        <a href="cerna-hora.html" class="loc-card">
          <div class="loc-card__img-wrap">
            <img loading="lazy" src="images/cernahora.jpg" alt="Pizzerie U Zajíce – Černá Hora" class="loc-card__img">
          </div>
          <div class="loc-card__body">
            <h2 class="loc-card__name">Pizzerie U Zajíce</h2>
            <p class="loc-card__town">Černá Hora</p>
          </div>
          <span class="loc-card__arrow"><i class="fa-solid fa-arrow-right"></i></span>
        </a>

        <a href="rauty.html" class="loc-card">
          <div class="loc-card__img-wrap">
            <img loading="lazy" src="images/raut-hlavni.jpg" alt="Rauty – Pizzerie U Zajíce" class="loc-card__img">
          </div>
          <div class="loc-card__body">
            <h2 class="loc-card__name">Rauty – Catering</h2>
            <p class="loc-card__town">Pro každou příležitost</p>
          </div>
          <span class="loc-card__arrow"><i class="fa-solid fa-arrow-right"></i></span>
        </a>

      </div>

    </div>
  </main>

  <footer class="site-footer">
    &copy; 2026 U Zajíce<br>
    <span class="site-footer__credit">Designed by Triangl</span>
  </footer>

  <script>
  document.querySelectorAll('a[href]').forEach(function(a){
    var href=a.getAttribute('href');
    if(!href||href.startsWith('#')||href.startsWith('tel')||href.startsWith('mailto')||a.target==='_blank')return;
    a.addEventListener('click',function(e){
      e.preventDefault();
      document.body.classList.add('page-leaving');
      setTimeout(function(){location.href=href;},250);
    });
  });
  </script>
  <script>
  (function(){
    var html = document.documentElement;
    function current(){ return html.getAttribute('data-theme') === 'dark' ? 'dark' : 'light'; }
    function set(theme){
      if (theme === 'dark') html.setAttribute('data-theme', 'dark');
      else html.removeAttribute('data-theme');
      try { localStorage.setItem('uzajice-theme', theme); } catch(e) {}
      document.querySelectorAll('.theme-toggle').forEach(function(btn){
        btn.setAttribute('aria-checked', theme === 'dark' ? 'true' : 'false');
      });
    }
    function toggle(e){
      var next = current() === 'dark' ? 'light' : 'dark';
      var x = e.clientX, y = e.clientY;
      var end = Math.hypot(Math.max(x, innerWidth - x), Math.max(y, innerHeight - y));
      if (document.startViewTransition && !matchMedia('(prefers-reduced-motion: reduce)').matches) {
        html.style.setProperty('--reveal-x', x + 'px');
        html.style.setProperty('--reveal-y', y + 'px');
        html.style.setProperty('--reveal-r', end + 'px');
        document.startViewTransition(function(){ set(next); });
      } else {
        set(next);
      }
    }
    document.querySelectorAll('.theme-toggle').forEach(function(btn){
      btn.setAttribute('role', 'switch');
      btn.setAttribute('tabindex', '0');
      btn.setAttribute('aria-checked', current() === 'dark' ? 'true' : 'false');
      btn.addEventListener('click', function(e){ e.preventDefault(); e.stopPropagation(); toggle(e); });
      btn.addEventListener('keydown', function(e){
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggle(e); }
      });
    });
    try {
      matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e){
        if (localStorage.getItem('uzajice-theme')) return;
        set(e.matches ? 'dark' : 'light');
      });
    } catch(e) {}
  })();
  </script>
</body>
</html>
