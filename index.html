<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Pizzerie U Zajíce – Vyberte si provozovnu v Černé Hoře nebo Lhotě Rapotině. Pizza, obědová menu, rozvoz.">
  <title>Pizzerie U Zajíce</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="images/zajic.png" type="image/png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

  <main class="hero-page">
    <div class="hero-content">

      <img src="images/zajic.png" alt="Logo Pizzerie U Zajíce" class="hero__logo">

      <h1 class="hero__brand">Pizzerie U Zajíce</h1>
      <p class="hero__subtitle">Vyberte si provozovnu</p>

      <div class="location-cards">

        <a href="lhota-rapotina.html" class="loc-card">
          <div class="loc-card__img-wrap">
            <img src="images/lhota.jpg" alt="Menu Zajíc – Lhota Rapotina" class="loc-card__img">
          </div>
          <div class="loc-card__body">
            <h2 class="loc-card__name">Menu Zajíc</h2>
            <p class="loc-card__town">Lhota Rapotina</p>
          </div>
          <span class="loc-card__arrow"><i class="fa-solid fa-arrow-right"></i></span>
        </a>

        <a href="cerna-hora.html" class="loc-card">
          <div class="loc-card__img-wrap">
            <img src="images/cernahora.jpg" alt="Pizzerie U Zajíce – Černá Hora" class="loc-card__img">
          </div>
          <div class="loc-card__body">
            <h2 class="loc-card__name">Pizzerie U Zajíce</h2>
            <p class="loc-card__town">Černá Hora</p>
          </div>
          <span class="loc-card__arrow"><i class="fa-solid fa-arrow-right"></i></span>
        </a>

        <a href="rauty.html" class="loc-card">
          <div class="loc-card__img-wrap">
            <img src="images/raut-hlavni.jpg" alt="Rauty – Pizzerie U Zajíce" class="loc-card__img">
          </div>
          <div class="loc-card__body">
            <h2 class="loc-card__name">Rauty</h2>
            <p class="loc-card__town">Pro každou příležitost</p>
          </div>
          <span class="loc-card__arrow"><i class="fa-solid fa-arrow-right"></i></span>
        </a>

      </div>

    </div>
  </main>

  <footer class="site-footer">
    &copy; 2026 Pizzerie U Zajíce<br>
    <span class="site-footer__credit">Designed by Triangl</span>
  </footer>

</body>
</html>
